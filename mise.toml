[tools]
go = "1.26.5"
sqlite = "3.51.2"

golangci-lint = "2.10.1"
sqlc = "1.30.0"
bun = "1.3.11"
ripgrep = "latest"
"go:github.com/air-verse/air" = "1.64.5"

"github:nrempel/sleek" = "v0.5.0"
"go:mvdan.cc/gofumpt" = "0.9.2"
"go:golang.org/x/tools/cmd/goimports" = "0.42.0"


# dev

[tasks.fmt]
alias = "format"
description = "Format all source code"
depends = ["fmt:go", "fmt:sql", "fmt:web"]

[tasks."fmt:go"]
description = "Format Go source"
run = [
    "rg --files -g '*.go' -g '!tools/ci-results/viewer/frontend/node_modules/**' | xargs goimports -w",
    "rg --files -g '*.go' -g '!tools/ci-results/viewer/frontend/node_modules/**' | xargs gofumpt -w",
    "go mod tidy",
]

[tasks."fmt:sql"]
description = "Format SQL queries and migrations"
run = [
    "sleek 'internal/ciresults/db/queries/*.sql'",
    "sleek 'internal/ciresults/db/migrations/*.sql'",
]

[tasks."fmt:web"]
description = "Format the CI viewer frontend"
dir = "tools/ci-results/viewer/frontend"
run = "bun run format"

[tasks."dev:container-udp"]
description = "Run UDP container topology"
run = "sudo ./scripts/container-udp-topology.sh ${RUNTIME:-podman} ${N:-4}"

# running

[tasks.run]
description = "Run the last executed run task"
run = """
if [ -f .last_run ]; then
    TASK=$(cat .last_run)
    echo "Running: $TASK"
    mise run "$TASK"
else
    echo "No previous run task."
    exit 1
fi
"""

[tasks."run:tethux"]
description = "Run multicall help"
run = """
echo "$MISE_TASK_NAME" > .last_run
go run ./cmd/tethux
"""

[tasks."run:bridge-multicall"]
alias = "run:bridgem"
description = "Run bridge through multicall"
run = """
echo "$MISE_TASK_NAME" > .last_run
go run ./cmd/tethux bridge
"""

[tasks."run:virt-multicall"]
alias = "run:virtm"
description = "Run virt through multicall"
run = """
echo "$MISE_TASK_NAME" > .last_run
go run ./cmd/tethux virt
"""

[tasks."run:bridge"]
alias = "run:bridge-standalone"
description = "Run standalone bridge"
run = """
echo "$MISE_TASK_NAME" > .last_run
go run ./cmd/bridge/main
"""

[tasks."run:virt"]
alias = "run:virt-standalone"
description = "Run standalone virt"
run = """
echo "$MISE_TASK_NAME" > .last_run
go run ./cmd/virt/main
"""

# build

[tasks.build]
description = "Build all binaries"
depends = [
	"build:create-bin-dir",
	"build:go",
	"build:standalone",
	"build:ci-results",
	"build:symlinks",
]

[tasks."build:create-bin-dir"]
hide = true
run = "mkdir -p ./bin"

[tasks."build:go"]
description = "Build multicall binary"
depends = ["build:create-bin-dir"]
run = "go build -o ./bin/tethux ./cmd/tethux"

[tasks."build:standalone"]
description = "Build standalone binaries"
depends = ["build:create-bin-dir"]
run = """
go build -o ./bin/tethux-bridge ./cmd/bridge/main
go build -o ./bin/tethux-virt ./cmd/virt/main
"""

[tasks."build:viewer-frontend"]
description = "Build the SvelteKit SPA for embedding"
dir = "tools/ci-results/viewer/frontend"
run = ["bun install --frozen-lockfile", "bun run build", "touch build/.gitkeep"]

[tasks."build:ci-results"]
description = "Build the combined CI ingestion and viewer CLI"
depends = ["build:create-bin-dir", "build:viewer-frontend"]
run = "go build -o ./bin/ci-results ./tools/ci-results"

[tasks."build:symlinks"]
description = "Create multicall symlinks"
depends = ["build:go"]
run = """
cd ./bin
ln -sf tethux bridge
ln -sf tethux virt
"""

# ci

[tasks.lint]
description = "Run all linters"
depends = ["lint:go", "lint:web"]

[tasks."lint:go"]
description = "Run Go linter"
run = "golangci-lint run -c .golangci.yml"

[tasks."lint:web"]
description = "Lint and type-check the CI viewer frontend"
dir = "tools/ci-results/viewer/frontend"
run = ["bun run lint", "bun run check", "bun run format:check"]

[tasks.test]
description = "Run all tests"
depends = ["test:go", "test:web"]

[tasks."test:go"]
description = "Run Go tests"
run = "go list ./... | rg -v '/node_modules/' | xargs go test"

[tasks."test:web"]
description = "Validate the CI viewer frontend"
dir = "tools/ci-results/viewer/frontend"
run = "bun run check"

[tasks.sqlc]
description = "Regenerate typed database queries"
run = "sqlc generate"

[tasks."dev:viewer"]
description = "Ingest fixture archives, then run the live-reloading CI viewer"
run = [
    "go run ./tools/ci-results ingest -path ./ingestion/archive -db ./data/ci/ci-res.db",
    "air -c .air.toml",
]

[tasks."ci:normal"]
description = "Run the unprivileged CI path"
depends = ["lint", "test", "build"]

[tasks."ci:canary:providers"]
description = "Run privileged container provider smoke tests"
run = "sudo ./nix/scripts/provider-smoke.sh all"

[tasks."ci:laptop"]
description = "Run lint, unit tests, all provider operations, and one bridge topology"
run = "./nix/scripts/laptop-integration.sh ${RUNTIME:?set RUNTIME=docker or podman}"

[tasks."test:integration:local"]
description = "Opt-in archived provider, bridge-backend, and topology integration run"
run = "./nix/scripts/local-integration.sh ${RUNTIME:?set RUNTIME=docker or podman}"

[tasks."test:bridge-backends:local"]
description = "Opt-in archived UDP/raw/pcap/TAP exact-frame tests"
run = "./nix/scripts/local-integration.sh bridge-backends"

[tasks."test:integration:nas"]
description = "Opt-in local integration run, atomically published to the NAS"
run = "TETHUX_ARCHIVE_NAS_HOST=${NAS_HOST:-nas} ./nix/scripts/local-integration.sh ${RUNTIME:?set RUNTIME=docker or podman}"

[tasks."test:bridge-backends:nas"]
description = "Opt-in backend packet tests, atomically published to the NAS"
run = "TETHUX_ARCHIVE_NAS_HOST=${NAS_HOST:-nas} ./nix/scripts/local-integration.sh bridge-backends"

[tasks."archive:nas:inventory"]
description = "Write a local ignored inventory of NAS test archives and schemas"
run = "./nix/scripts/nas-archive-inventory.sh ${NAS_HOST:-nas}"

[tasks."ci:canary:topology"]
description = "Run privileged bridge topology smoke tests"
run = "sudo ./nix/scripts/topology-smoke.sh all"

[tasks."ci:canary:hypervisors"]
description = "Run privileged network and hypervisor smoke tests"
run = "sudo ./nix/scripts/hypervisor-smoke.sh"

[tasks."host:discover"]
description = "Discover known tethux canary hosts on the LAN"
run = "./nix/scripts/discover-hosts.sh ${SUBNET:-}"

[tasks."host:audit"]
description = "Audit a canary host over SSH, e.g. HOST=veya@10.0.0.100 mise run host:audit"
run = "./nix/scripts/audit-host.sh ${HOST:?set HOST=user@host}"

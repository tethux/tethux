when:
  - event: push
  - event: pull_request
  - event: manual

labels:
  host: nas
  tethux-canary: "true"
  privileged: "true"

depends_on:
  - laptop-78

steps:
  managed-container-link:
    image: nixos/nix
    volumes:
      - tethux-ci-nix:/nix
      - /var/cache/tethux-ci/go-build:/root/.cache/go-build
      - /var/cache/tethux-ci/go-mod:/root/go/pkg/mod
      - /var/cache/tethux-ci/archive:/var/lib/tethux-ci/archive
    commands:
      - nix develop .#ci --extra-experimental-features "nix-command flakes" -c env TETHUX_DEVICE_ID=cross-laptop TETHUX_CONTAINER_RUNTIME=docker+podman ./nix/scripts/test-archive-run.sh cross-laptop ./nix/scripts/remote-cross-laptop-integration.sh

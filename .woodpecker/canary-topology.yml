when:
  - event: push
    branch: master
  - event: manual

labels:
  tethux-canary: "true"
  privileged: "true"

steps:
  topology-smoke:
    image: nixos/nix
    privileged: true
    commands:
      - nix develop --extra-experimental-features "nix-command flakes" -c ./nix/scripts/topology-smoke.sh all

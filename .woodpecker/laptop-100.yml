when:
  - event: push
  - event: pull_request
  - event: manual

labels:
  host: nas
  tethux-canary: "true"
  privileged: "true"

depends_on:
  - normal

steps:
  docker-bridge-and-all-providers:
    image: nixos/nix
    volumes:
      - tethux-ci-nix:/nix
      - /var/cache/tethux-ci/go-build:/root/.cache/go-build
      - /var/cache/tethux-ci/go-mod:/root/go/pkg/mod
      - /var/cache/tethux-ci/archive:/var/lib/tethux-ci/archive
    commands:
      - nix develop .#ci --extra-experimental-features "nix-command flakes" -c env TETHUX_DEVICE_ID=laptop-100 TETHUX_CONTAINER_RUNTIME=docker ./nix/scripts/test-archive-run.sh laptop-100 ./nix/scripts/remote-laptop-integration.sh ci@10.0.0.100 docker

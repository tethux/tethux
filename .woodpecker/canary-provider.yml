when:
  - event: push
    branch: master
  - event: manual

labels:
  tethux-canary: "true"
  privileged: "true"

steps:
  provider-smoke:
    image: nixos/nix
    privileged: true
    environment:
      TETHUX_VIRT_TEST_HOST: ci@10.0.0.78
    commands:
      - nix develop .#ci --extra-experimental-features "nix-command flakes" -c go build ./cmd/tethux
      - nix develop .#ci --extra-experimental-features "nix-command flakes" -c ./nix/scripts/provider-smoke.sh all

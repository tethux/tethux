when:
  - event: [cron, manual]

labels:
  tethux-canary: "true"
  privileged: "true"

steps:
  hypervisor-smoke:
    image: nixos/nix
    privileged: true
    commands:
      - nix develop --extra-experimental-features "nix-command flakes" -c sudo ./nix/scripts/hypervisor-smoke.sh

  large-topology:
    image: nixos/nix
    privileged: true
    environment:
      TETHUX_TOPOLOGY_SMALL_N: "4"
      TETHUX_TOPOLOGY_LARGE_N: "32"
      TETHUX_TOPOLOGY_PARALLEL_JOBS: "8"
    commands:
      - nix develop --extra-experimental-features "nix-command flakes" -c sudo ./nix/scripts/topology-smoke.sh all

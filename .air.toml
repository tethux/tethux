root = "."
tmp_dir = ".air"

[build]
cmd = "go build -o ./.air/ci-results ./tools/ci-results"
full_bin = "./.air/ci-results serve -db ./data/ci/ci-res.db -port 8081"
delay = 500
exclude_dir = [
  "tools/ci-results/viewer/frontend",
]
exclude_regex = ["_test\\.go$"]
include_dir = ["internal/ciresults", "tools/ci-results"]
include_ext = ["go", "sql"]
kill_delay = "2s"
log = ".air/build-errors.log"
send_interrupt = true
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
